# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  review_details: false
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*.java"
      instructions: |
        Verify that the implementation aligns with the architecture defined in:
        specs/_meta.md
        specs/technical.md
        specs/functional.md
        
        Do not introduce behavior outside specifications.
        
        Check for thread safety issues:
        - Shared mutable state
        - Missing synchronization
        - Unsafe static variables
        - Improper executor usage
        
        Check for security issues:
        - Injection risks
        - Insecure deserialization
        - Unsafe file handling
        - Credential exposure
        - Improper exception handling
chat:
  auto_reply: true